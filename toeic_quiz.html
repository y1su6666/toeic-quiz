<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新制多益單字複習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #7c6ff7;
    --accent2: #a59ff8;
    --accent-dim: rgba(124,111,247,0.15);
    --text: #f0efff;
    --text2: #a8a6c0;
    --text3: #6b6882;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --yellow: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 680px;
    padding: 1.5rem 1.5rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--accent2); letter-spacing: 0.03em; }
  .logo span { color: var(--text3); font-size: 0.8rem; font-family: 'Noto Sans TC', sans-serif; margin-left: 0.5rem; font-weight: 400; }

  /* STATS BAR */
  .stats {
    width: 100%;
    max-width: 680px;
    padding: 1rem 1.5rem 0;
    display: flex;
    gap: 10px;
  }
  .stat { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 0.6rem 0.75rem; text-align: center; }
  .stat-n { font-size: 1.3rem; font-weight: 700; }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .stat-n.green { color: var(--green); }
  .stat-n.red { color: var(--red); }
  .stat-n.acc { color: var(--accent2); }

  /* CONTROLS */
  .controls {
    width: 100%;
    max-width: 680px;
    padding: 1rem 1.5rem 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    flex: 1;
    min-width: 90px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.5rem;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .ctrl-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }
  .ctrl-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }

  /* CATEGORY FILTER */
  .cat-filter {
    width: 100%;
    max-width: 680px;
    padding: 0.6rem 1.5rem 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cat-btn {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .cat-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

  /* PROGRESS */
  .progress-wrap {
    width: 100%;
    max-width: 680px;
    padding: 1rem 1.5rem 0;
  }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .progress-bg { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }

  /* QUESTION CARD */
  .main {
    width: 100%;
    max-width: 680px;
    padding: 1rem 1.5rem;
    flex: 1;
  }
  .q-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.5rem 1.75rem;
    text-align: center;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 80px;
    background: radial-gradient(ellipse, rgba(124,111,247,0.12), transparent 70%);
    pointer-events: none;
  }
  .q-type { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .q-word { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: var(--text); line-height: 1.2; }
  .q-pos { font-size: 12px; color: var(--accent2); margin-top: 0.4rem; background: var(--accent-dim); display: inline-block; padding: 2px 10px; border-radius: 99px; }

  /* OPTIONS */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .opt {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 12px;
    padding: 0.9rem 1rem;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    line-height: 1.4;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .opt .opt-key { width: 22px; height: 22px; border-radius: 6px; background: var(--surface2); font-size: 11px; color: var(--text3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .opt.correct { border-color: var(--green); background: var(--green-dim); }
  .opt.correct .opt-key { background: var(--green); color: #0f0f13; }
  .opt.wrong { border-color: var(--red); background: var(--red-dim); }
  .opt.wrong .opt-key { background: var(--red); color: #0f0f13; }
  .opt:disabled { cursor: default; }

  /* BOTTOM ROW */
  .bottom { display: flex; justify-content: space-between; align-items: center; }
  .skip-btn { font-size: 13px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: inherit; padding: 0.5rem 0; }
  .skip-btn:hover { color: var(--text2); }
  .next-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.6rem 1.5rem;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    opacity: 0.4;
    pointer-events: none;
  }
  .next-btn.ready { opacity: 1; pointer-events: auto; }
  .next-btn.ready:hover { background: var(--accent2); transform: translateY(-1px); }

  /* RESULT FEEDBACK */
  .feedback {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--text2);
    display: none;
    line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback .ex { color: var(--text3); font-size: 12px; margin-top: 4px; }

  /* FINISH SCREEN */
  #finish {
    display: none;
    width: 100%;
    max-width: 680px;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .finish-icon { font-size: 3rem; margin-bottom: 1rem; }
  .finish-title { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--text); margin-bottom: 0.5rem; }
  .finish-sub { color: var(--text2); font-size: 14px; margin-bottom: 2rem; }
  .finish-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 2rem; }
  .f-stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem; }
  .f-stat .fn { font-size: 1.8rem; font-weight: 700; }
  .f-stat .fl { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .restart-btn {
    background: var(--accent); color: white; border: none; border-radius: 12px;
    padding: 0.75rem 2rem; font-size: 15px; font-family: inherit; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .restart-btn:hover { background: var(--accent2); }

  @media (max-width: 480px) {
    .q-word { font-size: 1.8rem; }
    .options { grid-template-columns: 1fr; }
    .controls { gap: 6px; }
    .ctrl-btn { font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">多益單字 <span>TOEIC Vocab</span></div>
  <div style="font-size:12px;color:var(--text3)" id="total-count"></div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-n green" id="s-correct">0</div><div class="stat-l">答對</div></div>
  <div class="stat"><div class="stat-n red" id="s-wrong">0</div><div class="stat-l">答錯</div></div>
  <div class="stat"><div class="stat-n acc" id="s-remain">0</div><div class="stat-l">剩餘</div></div>
</div>

<div class="controls">
  <button class="ctrl-btn active" data-mode="random" onclick="setMode('random',this)">🔀 隨機混合</button>
  <button class="ctrl-btn" data-mode="en2zh" onclick="setMode('en2zh',this)">EN → 中文</button>
  <button class="ctrl-btn" data-mode="zh2en" onclick="setMode('zh2en',this)">中文 → EN</button>
</div>

<div class="cat-filter">
  <button class="cat-btn active" data-cat="all" onclick="setCat('all',this)">全部</button>
  <button class="cat-btn" data-cat="noun" onclick="setCat('noun',this)">名詞</button>
  <button class="cat-btn" data-cat="verb" onclick="setCat('verb',this)">動詞</button>
  <button class="cat-btn" data-cat="adj" onclick="setCat('adj',this)">形容詞</button>
  <button class="cat-btn" data-cat="adv" onclick="setCat('adv',this)">副詞</button>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-text">第 1 題</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bg"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="main" id="quiz-area">
  <div class="q-card">
    <div class="q-type" id="q-type">請選出正確的中文意思</div>
    <div class="q-word" id="q-word">loading...</div>
    <div class="q-pos" id="q-pos">名詞</div>
  </div>
  <div class="options" id="opts"></div>
  <div class="feedback" id="feedback"></div>
  <div class="bottom">
    <button class="skip-btn" onclick="skip()">跳過這題 →</button>
    <button class="next-btn" id="next-btn" onclick="nextQ()">下一題 →</button>
  </div>
</div>

<div id="finish">
  <div class="finish-icon">🎉</div>
  <div class="finish-title">完成了！</div>
  <div class="finish-sub" id="finish-sub"></div>
  <div class="finish-stats">
    <div class="f-stat"><div class="fn green" id="f-correct">0</div><div class="fl">答對</div></div>
    <div class="f-stat"><div class="fn red" id="f-wrong">0</div><div class="fl">答錯</div></div>
    <div class="f-stat"><div class="fn" id="f-acc" style="color:var(--accent2)">0%</div><div class="fl">正確率</div></div>
  </div>
  <button class="restart-btn" onclick="restart()">再來一輪 🔄</button>
</div>

const CAT_LABEL = {noun:"名詞",verb:"動詞",adj:"形容詞",adv:"副詞"};
const KEYS = ["①","②","③","④"];

let mode = "random";
let activeCat = "all";
let pool = [];
let queue = [];
let qIndex = 0;
let correct = 0, wrong = 0;
let answered = false;

function filteredWords() {
  return activeCat === "all" ? WORDS : WORDS.filter(w => w.cat === activeCat);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setCat(c, el) {
  activeCat = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  restart();
}

function restart() {
  pool = shuffle([...filteredWords()]);
  queue = [...pool];
  qIndex = 0; correct = 0; wrong = 0; answered = false;
  document.getElementById('finish').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('total-count').textContent = pool.length + ' 個單字';
  updateStats();
  loadQ();
}

function updateStats() {
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-remain').textContent = Math.max(0, queue.length - qIndex);
}

function loadQ() {
  if (qIndex >= queue.length) { showFinish(); return; }
  answered = false;
  const w = queue[qIndex];
  const total = queue.length;

  // decide direction
  let dir = mode;
  if (dir === "random") dir = Math.random() < 0.5 ? "en2zh" : "zh2en";

  // question display
  const isEn2Zh = dir === "en2zh";
  document.getElementById('q-type').textContent = isEn2Zh ? '請選出正確的中文意思' : '請選出正確的英文單字';
  document.getElementById('q-word').textContent = isEn2Zh ? w.en : w.zh;
  document.getElementById('q-pos').textContent = CAT_LABEL[w.cat];

  // progress
  const pct = Math.round((qIndex / total) * 100);
  document.getElementById('prog-text').textContent = `第 ${qIndex+1} 題 / 共 ${total} 題`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  // options: 1 correct + 3 distractors from same category or all
  const sameCat = pool.filter(x => x !== w && x.cat === w.cat);
  const others = sameCat.length >= 3 ? sameCat : pool.filter(x => x !== w);
  const distractors = shuffle([...others]).slice(0, 3);
  const choices = shuffle([w, ...distractors]);

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-key">${KEYS[i]}</span><span>${isEn2Zh ? c.zh : c.en}</span>`;
    btn.onclick = () => pick(btn, c === w, w, isEn2Zh);
    opts.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';
  updateStats();
}

function pick(btn, isCorrect, word, isEn2Zh) {
  if (answered) return;
  answered = true;
  if (isCorrect) {
    correct++;
    btn.classList.add('correct');
  } else {
    wrong++;
    btn.classList.add('wrong');
    // show correct
    document.querySelectorAll('.opt').forEach(b => {
      const txt = b.querySelector('span:last-child').textContent;
      const match = isEn2Zh ? txt === word.zh : txt === word.en;
      if (match) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);

  // feedback
  const fb = document.getElementById('feedback');
  fb.innerHTML = `<strong>${word.en}</strong> = ${word.zh}<div class="ex">常考搭配：${word.ex}</div>`;
  fb.classList.add('show');

  document.getElementById('next-btn').classList.add('ready');
  updateStats();
}

function skip() {
  // move current word to end of queue for retry
  const w = queue.splice(qIndex, 1)[0];
  queue.push(w);
  loadQ();
}

function nextQ() {
  if (!answered) return;
  qIndex++;
  loadQ();
}

function showFinish() {
  document.getElementById('quiz-area').style.display = 'none';
  const fin = document.getElementById('finish');
  fin.style.display = 'block';
  const total = correct + wrong;
  const acc = total > 0 ? Math.round((correct/total)*100) : 0;
  document.getElementById('f-correct').textContent = correct;
  document.getElementById('f-wrong').textContent = wrong;
  document.getElementById('f-acc').textContent = acc + '%';
  const msg = acc >= 90 ? '太厲害了！多益滿分就是你 🔥' :
              acc >= 70 ? '不錯！再加把勁就完美了 💪' :
              acc >= 50 ? '繼續練習，你可以的 📚' : '多看幾遍，你一定能進步 😊';
  document.getElementById('finish-sub').textContent = msg;
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  const map = {'1':0,'2':1,'3':2,'4':3};
  if (e.key in map && !answered) {
    const btns = document.querySelectorAll('.opt');
    if (btns[map[e.key]]) btns[map[e.key]].click();
  }
  if ((e.key === 'Enter' || e.key === ' ') && answered) nextQ();
});

// init
restart();
</script>
